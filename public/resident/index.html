<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>자리픽</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="description" content="우리 단지 주차, 직접 신청하세요" />
<meta name="theme-color" content="#3B82F6" />

<!-- PWA: iOS Safari -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="자리픽" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" href="/resident/icon-192.png" />
<link rel="icon" type="image/png" href="/resident/icon-192.png" />

<!-- PWA: manifest -->
<link rel="manifest" href="/resident/manifest.webmanifest" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0b1220; font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; color: #fff; }
  #stage { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 16px; }
  .topbar {
    position: fixed; top: 12px; left: 12px; right: 12px; z-index: 100;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    background: rgba(16,24,40,0.9); backdrop-filter: blur(8px);
    padding: 8px 12px; border-radius: 10px; font-size: 12px;
  }
  .topbar a, .topbar button {
    background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #fff;
    padding: 6px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; text-decoration: none;
    font-family: inherit;
  }
  .topbar button.active { background: #3B82F6; border-color: #3B82F6; }
  .topbar .spacer { flex: 1; }
  .topbar .label { opacity: 0.6; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  #root { margin-top: 56px; }

  /* PWA / demo mode: hide dev topbar, fullscreen */
  html.pwa body { background: #fff; }
  html.pwa .topbar { display: none; }
  html.pwa #stage { padding: 0; min-height: 100vh; min-height: 100dvh; display: block; }
  html.pwa #root { margin-top: 0; width: 100%; height: 100vh; height: 100dvh; }

  @keyframes jp-spin { to { transform: rotate(360deg); } }
</style>
<!-- Preload Naver Maps SDK so map is ready before user opens 구역 -->
<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=qxze9eualp" async data-naver-maps></script>

<!-- Supabase Auth (Kakao OAuth) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="/api/public/config"></script>
<script>
  (function(){
    var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    var demo = /[?&]demo=1/.test(location.search);
    if (standalone || demo) document.documentElement.classList.add('pwa');
  })();
</script>
</head>
<body>

<div class="topbar">
  <span class="label">JariPick · 입주민</span>
  <span class="spacer"></span>
  <span class="label">점프:</span>
  <button data-jump="splash">스플래시</button>
  <button data-jump="login">로그인</button>
  <button data-jump="complex_register">단지등록</button>
  <button data-jump="vehicle">차량</button>
  <button data-jump="pending">승인대기</button>
  <button data-jump="home" class="active">홈</button>
  <button data-jump="list">구역</button>
  <button data-jump="bids">내신청</button>
  <button data-jump="cert">내구역</button>
  <button data-jump="notifications">알림</button>
  <button data-jump="settings">설정</button>
  <button data-jump="payment">결제</button>
  <button data-jump="rebid">재입찰/취소</button>
  <button data-jump="error">에러</button>
  <button data-jump="faq">FAQ</button>
  <span class="spacer"></span>
  <a href="../index.html">← 목록</a>
</div>

<div id="stage"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="/resident/ios-frame.jsx"></script>
<script type="text/babel" src="/resident/jp-auth.jsx"></script>
<script type="text/babel" src="/resident/Primitives.jsx"></script>
<script type="text/babel" src="/resident/ScreensA.jsx"></script>
<script type="text/babel" src="/resident/ScreensB.jsx"></script>
<script type="text/babel" src="/resident/ScreensOnboarding.jsx"></script>
<script type="text/babel" src="/resident/ScreensExtras.jsx"></script>

<script type="text/babel">
const IOSFrame = window.IOSDevice;

// Initial app state with seeded data
const INITIAL = {
  myBids: [
    { spot: 'A-23', amount: 160000, date: '2026-04-18 · 1위' },
    { spot: 'B-07', amount: 120000, date: '2026-04-17 · 순위 밖' },
  ],
  hotSpots: [
    { number: 'A-23', top: 160000, count: 3 },
    { number: 'C-03', top: 200000, count: 5 },
    { number: 'B-09', top: 140000, count: 2 },
  ],
  auction: true,
  hasAssignment: true,
  currentSpot: 'A-23',
  lastSpot: 'A-23',
  lastAmount: 160000,
};

const SCREEN_COMPS = {
  splash: window.SplashScreen,
  login: window.LoginScreen,
  complex_register: window.ComplexRegisterScreen,
  vehicle: window.VehicleScreen,
  pending: window.PendingScreen,
  home: window.HomeScreen,
  list: window.SpotListScreen,
  detail: window.SpotDetailScreen,
  bid: window.BidScreen,
  complete: window.BidCompleteScreen,
  bids: window.MyBidsScreen,
  cert: window.MySpotCertScreen,
  notifications: window.NotificationsScreen,
  settings: window.SettingsScreen,
  payment: window.PaymentScreen,
  rebid: window.ReBidCancelScreen,
  error: window.ErrorScreen,
  faq: window.FaqScreen,
  support: window.SupportScreen,
};

// Which screens show a bottom tab bar
const WITH_TABBAR = new Set(['home', 'list', 'bids', 'cert']);
const TAB_MAP = { home: 'home', list: 'list', bids: 'bids', cert: 'cert' };

function App() {
  const [screen, setScreen] = React.useState('home');
  const [state, setState] = React.useState(INITIAL);

  // Listen to topbar jump buttons
  React.useEffect(() => {
    const onClick = (e) => {
      const btn = e.target.closest('[data-jump]');
      if (!btn) return;
      setScreen(btn.dataset.jump);
    };
    document.addEventListener('click', onClick);
    return () => document.removeEventListener('click', onClick);
  }, []);

  // Reflect active jump button
  React.useEffect(() => {
    document.querySelectorAll('[data-jump]').forEach(b => {
      b.classList.toggle('active', b.dataset.jump === screen);
    });
  }, [screen]);

  const go = (next, patch = {}) => {
    setState(s => ({ ...s, ...patch, currentSpot: patch.spot || s.currentSpot, lastSpot: patch.spot || s.lastSpot, lastAmount: patch.amount || s.lastAmount }));
    setScreen(next);
  };

  const Comp = SCREEN_COMPS[screen] || SCREEN_COMPS.home;

  const showTab = WITH_TABBAR.has(screen);
  const tabKey = TAB_MAP[screen] || 'home';

  const isPwa = document.documentElement.classList.contains('pwa');
  const [tapCount, setTapCount] = React.useState(0);
  const resetTapTimer = React.useRef(null);
  const onCornerTap = () => {
    const next = tapCount + 1;
    setTapCount(next);
    clearTimeout(resetTapTimer.current);
    resetTapTimer.current = setTimeout(() => setTapCount(0), 2000);
    if (next >= 5) { setTapCount(0); setState(INITIAL); setScreen('home'); }
  };
  const body = (
    <div style={{ position: 'relative', width: '100%', height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ flex: 1, minHeight: 0, overflowY: 'auto', overflowX: 'hidden', WebkitOverflowScrolling: 'touch' }}>
        <Comp go={go} state={state} />
      </div>
      {showTab && <window.JPTabBar active={tabKey} onChange={(k) => setScreen(k)} />}
      {isPwa && <div onClick={onCornerTap} style={{
        position: 'fixed', top: 0, right: 0, width: 44, height: 44, zIndex: 9999,
        opacity: 0, background: 'transparent',
      }} />}
    </div>
  );
  return isPwa ? body : <IOSFrame>{body}</IOSFrame>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
