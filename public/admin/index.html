<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>자리픽 · 관리자</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/admin/admin.css" />
<style>
  body { background: var(--n50); }
  .shell { height: 100vh; min-height: 700px; }
</style>
</head>
<body>

<div id="root"></div>

<script>
// ── Admin auth + fetch wrapper ────────────────────────────────────
(function () {
  const TOKEN_KEY = 'jp_admin_token';
  const USER_KEY = 'jp_admin_user';

  window.jpAdminAuth = {
    token() { return localStorage.getItem(TOKEN_KEY); },
    user() {
      try { return JSON.parse(localStorage.getItem(USER_KEY) || 'null'); }
      catch (_) { return null; }
    },
    set(token, user) {
      localStorage.setItem(TOKEN_KEY, token);
      localStorage.setItem(USER_KEY, JSON.stringify(user || {}));
    },
    clear() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USER_KEY);
    },
  };

  window.jpToast = function (msg, kind) {
    kind = kind || 'info';
    let host = document.getElementById('jp-toast-host');
    if (!host) {
      host = document.createElement('div');
      host.id = 'jp-toast-host';
      host.style.cssText = 'position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;';
      document.body.appendChild(host);
    }
    const el = document.createElement('div');
    const bg = kind === 'error' ? '#dc2626' : kind === 'ok' ? '#16a34a' : '#111827';
    el.style.cssText = `background:${bg};color:#fff;padding:10px 14px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);font-size:13px;max-width:360px;pointer-events:auto;opacity:0;transition:opacity .15s;`;
    el.textContent = msg;
    host.appendChild(el);
    requestAnimationFrame(() => { el.style.opacity = '1'; });
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 200); }, 3200);
  };

  const originalFetch = window.fetch.bind(window);
  window.fetch = async function (input, init) {
    init = init || {};
    const silent = init.silent === true;
    if (init.silent !== undefined) delete init.silent;

    // Only attach Bearer for same-origin string URLs (skip login endpoint itself)
    const url = typeof input === 'string' ? input : (input && input.url) || '';
    const isSameOrigin = url.startsWith('/') || url.startsWith(window.location.origin);
    const token = localStorage.getItem(TOKEN_KEY);
    if (isSameOrigin && token && url !== '/api/admin/login') {
      const h = new Headers(init.headers || {});
      if (!h.has('Authorization')) h.set('Authorization', 'Bearer ' + token);
      init.headers = h;
    }

    const res = await originalFetch(input, init);
    if (!silent && isSameOrigin && res.status === 401 && url !== '/api/admin/login') {
      window.jpAdminAuth.clear();
      window.jpToast('세션이 만료되었어요. 다시 로그인해주세요.', 'error');
      window.dispatchEvent(new Event('jp-admin-logout'));
      return res;
    }
    if (!silent && isSameOrigin && res.status >= 400 && res.status !== 409 && url !== '/api/admin/login') {
      try {
        const clone = res.clone();
        const json = await clone.json();
        if (json && json.error) window.jpToast(json.error, 'error');
      } catch (_) { /* not json */ }
    }
    return res;
  };
})();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="/admin/Pages.jsx"></script>
<script type="text/babel" src="/admin/GapPages.jsx"></script>
<script type="text/babel" src="/admin/LayoutEditor.jsx"></script>

<script type="text/babel">
const PAGES = {
  dashboard:  { title: '대시보드',     comp: () => window.Dashboard },
  layout:     { title: '구역 설정',     comp: () => window.LayoutEditorPage },
  spots:      { title: '구역 목록',    comp: () => window.SpotsPage },
  residents:  { title: '입주민',        comp: () => window.ResidentsPage },
  auctions:   { title: '입찰 라운드',  comp: () => window.AuctionsPage },
  complex:    { title: '단지 설정',    comp: () => window.ComplexPage },
  complaints: { title: '민원 / 문의',  comp: () => window.ComplaintsPage },
  announce:   { title: '공지 발송',    comp: () => window.AnnouncePage },
  payments:   { title: '정산 관리',    comp: () => window.PaymentsPage },
  adminusers: { title: '관리자 / 권한', comp: () => window.AdminUsersPage },
};

function App() {
  const [page, setPage] = React.useState('dashboard');
  const [admin, setAdmin] = React.useState(() => window.jpAdminAuth.user());
  const [bootstrapping, setBootstrapping] = React.useState(() => !!window.jpAdminAuth.token());

  // On first mount: if we have a token, validate it via /api/admin/session
  React.useEffect(() => {
    if (!window.jpAdminAuth.token()) { setBootstrapping(false); return; }
    fetch('/api/admin/session', { cache: 'no-store', silent: true })
      .then(async r => {
        if (!r.ok) { window.jpAdminAuth.clear(); setAdmin(null); return; }
        const j = await r.json().catch(() => null);
        if (j && j.admin) {
          localStorage.setItem('jp_admin_user', JSON.stringify(j.admin));
          setAdmin(j.admin);
        }
      })
      .finally(() => setBootstrapping(false));
  }, []);

  // React to logout events from the fetch wrapper (401)
  React.useEffect(() => {
    const onLogout = () => setAdmin(null);
    window.addEventListener('jp-admin-logout', onLogout);
    return () => window.removeEventListener('jp-admin-logout', onLogout);
  }, []);

  const go = (k) => setPage(k);
  const logout = () => {
    window.jpAdminAuth.clear();
    setAdmin(null);
    setPage('dashboard');
  };

  if (bootstrapping) {
    return <div style={{ padding: 40, textAlign: 'center', color: '#6b7280' }}>불러오는 중…</div>;
  }

  if (!admin) {
    return <window.AdminLogin onLogin={(a) => setAdmin(a)} />;
  }

  const def = PAGES[page] || PAGES.dashboard;
  const Comp = def.comp();

  return (
    <div className="shell">
      <window.Sidebar active={page} go={go} admin={admin} onLogout={logout} />
      <div className="main">
        <div className="content">
          <Comp go={go} admin={admin} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
