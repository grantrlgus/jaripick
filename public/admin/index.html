<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>자리픽 · 관리자</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/admin/admin.css" />
<style>
  body { background: var(--n50); }
  .shell { height: 100vh; min-height: 700px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="/admin/Pages.jsx"></script>
<script type="text/babel" src="/admin/GapPages.jsx"></script>
<script type="text/babel" src="/admin/LayoutEditor.jsx"></script>

<script type="text/babel">
const PAGES = {
  login:      { title: '로그인',       comp: () => window.AdminLogin },
  dashboard:  { title: '대시보드',     comp: () => window.Dashboard },
  layout:     { title: '구역 설정',     comp: () => window.LayoutEditorPage },
  spots:      { title: '구역 목록',    comp: () => window.SpotsPage },
  residents:  { title: '입주민 승인',  comp: () => window.ResidentsPage },
  auctions:   { title: '입찰 라운드',  comp: () => window.AuctionsPage },
  complex:    { title: '단지 설정',    comp: () => window.ComplexPage },
  roundwiz:   { title: '라운드 마법사', comp: () => window.RoundWizardPage },
  complaints: { title: '민원 / 문의',  comp: () => window.ComplaintsPage },
  announce:   { title: '공지 발송',    comp: () => window.AnnouncePage },
  payments:   { title: '정산 관리',    comp: () => window.PaymentsPage },
  adminusers: { title: '관리자 / 권한', comp: () => window.AdminUsersPage },
};

function App() {
  const [page, setPage] = React.useState('dashboard');

  const go = (k) => setPage(k);
  const def = PAGES[page] || PAGES.dashboard;
  const Comp = def.comp();

  if (page === 'login') {
    return <window.AdminLogin go={go} />;
  }

  return (
    <div className="shell">
      <window.Sidebar active={page} go={go} />
      <div className="main">
        <div className="content">
          <Comp go={go} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
